<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Scheme Switcher</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
    <main>
        <h1>Color Scheme Switcher</h1>
        <div class="color-switcher">
            <button id="red-btn">Red</button>
            <button id="dark-btn">Dark</button>
            <button id="green-btn">Green</button>
            <button id="blue-btn">Blue</button>
            <button id="purple-btn">Purple</button>
        </div>
        <h2>Try to click on the button to change the background color</h2>
    </main>

    <script src="script.js"> </script>
</body>
</html>
