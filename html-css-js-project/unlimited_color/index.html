<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
    body{
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #000;
    }

    .box{
        text-align: center;
        padding: 20px;
        border: 2px solid #000; 
        height: 300px;
        width: 1100px;
        border-radius: 40px;
        font-size: 30px;
        background-color: #ccc4c4;
    }

    .buttons{
        margin-top: 25px;
    
    }

    .buttons button{
        margin: 0 40px;
         height: 90px;
        width: 180px;
        font-size: 50px;
        border-radius: 20px;
        background-color: rgb(60, 227, 227) ;
    }
    button:hover{
        background-color: rgb(181, 242, 242);
       transform: translateY(-10px) scale(1.5);
    }
</style>
</head>
<body>

<div class="box">
    <h1>Changing background color every second</h1>

    <div class="buttons">
        <button id="start">Start</button>
        <button id="stop">Stop</button>
    </div>
</div>

<script src="script.js">

</script>

</body>
</html>
