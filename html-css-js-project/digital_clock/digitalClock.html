<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        body{
            background-color: black;
            color: white;
        }
        .center{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #clock{
            font-size: 130px;
            padding: 50px 100px;
            background-color: #f3b108;
            height: 150px;
             width: 700px;
             text-align: center;
        }
        h1{
      font-family: 'Arial', sans-serif;
      font-size: 10rem;
            }


    </Style>
</head>
<body>
   <div class="center">
     <h1>Your clock</h1>
    <div Id="clock"></div>
   </div>



     <script>
        const clock = document.getElementById('clock');
       setInterval(() => {
        let date = new Date();
        date = date.toLocaleTimeString();
        clock.innerText = date;
       }, 1000);
            
    </script>
    
</body>
</html>
