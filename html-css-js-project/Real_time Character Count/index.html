<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Character count</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
     <h1>Real-time Character count</h1>
     <textarea id="textarea" class="textarea" placeholder="Type your thoughts ......." 
     maxlength="100"></textarea>

     <div class="counter_countainer">
         <p>
      Total character:
      <span class="Total-counter" id="Total-counter">0</span>
     </p>

     <p>
       Remaining:
      <span class="Remaining-count" id="Remaining-count">100</span>
     </p>
    
     </div>

    </div>
   
    <script src="script.js"></script>
</body>
</html>
